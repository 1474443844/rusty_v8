name: Build rusty_v8 for Android

on:
  workflow_dispatch: 
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  V8_FROM_SOURCE: 1
  TARGET_ARCH: aarch64-linux-android

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET_ARCH }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET_ARCH }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 【重要修正】移除了 clang, lld, gn, ninja-build。让 rusty_v8 自动下载配套版本！
          sudo apt-get install -y python3 curl git build-essential pkg-config glib-2.0

      - name: Configure Android Environment for Cargo
        run: |
          # 设置 Android NDK 环境变量供 rusty_v8 的 build.rs 读取
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          
          # 给 Rust/Cargo 配置 NDK Linker (Rust 编译产物时仍然需要)
          HOST_TAG=linux-x86_64
          API=24
          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/$HOST_TAG
          CC_PATH="$TOOLCHAIN/bin/${{ env.TARGET_ARCH }}${API}-clang"
          
          # 告诉 Cargo 如何连接 Android 目标
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CC_PATH" >> $GITHUB_ENV

      - name: Build rusty_v8
        run: |
          # 运行编译
          # rusty_v8 会自动下载正确的 gn, ninja 和 Chromium clang，并使用它们进行编译
          cargo build --target ${{ env.TARGET_ARCH }} --release

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rusty_v8-android-aarch64
          path: target/${{ env.TARGET_ARCH }}/release/librusty_v8.rlib
          retention-days: 7
